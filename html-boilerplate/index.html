<!DOCTYPE html>
<html lang="en">
    <!-- This is a comment I placed using Ctrl + / -->
    <head>
        <meta charset="UTF-8">
        <title>My First Webpage</title>
    </head>

    <body>
        <h1>Hello World!</h1>
        <p><strong>This paragraph is strong!</strong></p>
        <h2>This is the second heading
            <p>This is a nested paragraph within the second heading.</p>
            <p><em>This is a second, nested paragraph which is also emphasised!</em></p>
        </h2>
        <p>This is a paragraph following the second heading, but it is not nested.</p>
    </body>
</html>
